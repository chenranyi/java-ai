spring:
  application:
    name: java-ai-agent
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

langchain4j:
  chat-model:
    provider: openai
    api-key: ${OPENAI_API_KEY:your-openai-api-key}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model-name: ${MODEL_NAME:gpt-4}
    temperature: 0.7
    max-tokens: 2000

server:
  port: 8080

logging:
  level:
    dev.langchain4j: DEBUG
    com.teaching: DEBUG
